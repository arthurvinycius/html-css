<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible box</title>
    <style>
        body {
            margin: 50px;
        }
        div.container {
            background-color: blue;
            display: flex;
            flex-flow: row nowrap;

        }
        div.itens {
            background-color: cadetblue;
            text-align: center;
            border: 1px solid black;
            flex-basis: 200px;
        
        }

        div#cxA{
            flex-shrink: 1;
            flex-grow: 0;
        }

        div#cxB{
            flex-shrink:2;
            flex-grow: 2;
        }

        div#cxC{
            flex-shrink: 1;
            flex-grow: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="itens" id="cxA">A</div>
        <div class="itens" id="cxB">B</div>
        <div class="itens" id="cxC">C</div>
        
    </div>
    
</body>
</html>
