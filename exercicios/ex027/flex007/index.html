<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible box</title>
    <style>
        body {
            margin: 50px;
        }
        div.container {
            background-color: blue;

            display: flex;


        }
        div.itens {
            background-color: cadetblue;
            text-align: center;
            border: 1px solid black;
            padding: 20px;
            
        }
        div#i1{
            order: 0;
        }
        div#i2{
            order: -5;
        }
        div#i3{
            order: 1;
        }
        div#i4{
            order: -3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="itens" id="i1">A</div>
        <div class="itens" id="i2">B</div>
        <div class="itens" id="i3">C</div>
        <div class="itens" id="i4">D</div>
    </div>
    
</body>
</html>
