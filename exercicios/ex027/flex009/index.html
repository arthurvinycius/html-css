<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible box</title>
    <style>
        body {
            margin: 50px;
        }
        div.container {
            background-color: blue;

            display: flex;
            flex-flow: row nowrap;

        }
        div.itens {
            background-color: cadetblue;
            padding: 5px;
            text-align: center;
            border: 1px solid black;
            flex-basis: auto;

           
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="itens">A</div>
        <div class="itens">BBBBBBBBBBB</div>
        <div class="itens">C</div>
        <div class="itens">DDDDDDD</div>
    </div>
    
</body>
</html>
